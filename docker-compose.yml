###############################################################
# Crypto Trading Bot — Full Stack Docker Compose
#
# Usage:
#   1. Copy docker.env.template → .env and fill in secrets
#   2. docker compose build
#   3. docker compose up -d
#   4. docker compose logs -f bot    (watch bot logic)
#   5. Open http://<VPS_IP>:5173     (dashboard)
###############################################################

services:
  # ── PostgreSQL + TimescaleDB (ML time-series store) ───────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: crypto-postgres
    environment:
      POSTGRES_DB:       cryptobot
      POSTGRES_USER:     cryptobot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptobot_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ml_engine/data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptobot -d cryptobot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tradingnet

  # ── Bot Logic (Python — 24/7 ML trading engine) ───────────
  bot:
    build: ./backend
    container_name: crypto-bot-logic
    command: ["python", "src/main.py"]
    env_file: .env
    environment:
      - WS_SERVER_URL=ws://websocket:8080
      - DATABASE_URL=postgresql://cryptobot:${POSTGRES_PASSWORD:-cryptobot_dev}@postgres:5432/cryptobot
      - PYTHONUNBUFFERED=1
      - PYTHONUTF8=1
      - MONGO_URL=${MONGO_URL:-mongodb://localhost:27017/}
    volumes:
      - ml-data:/app/ml_engine/data/store
      - ml-models:/app/ml_engine/models/saved
      - ml-buffer:/app/ml_engine/data/store/experience_buffer
      - ./backend/config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      websocket:
        condition: service_started
    restart: unless-stopped
    networks:
      - tradingnet

  # ── Admin API (FastAPI on port 8000) ──────────────────────
  api:
    build: ./backend
    container_name: crypto-api
    command: ["uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://frontend:5173
      - DATABASE_URL=postgresql://cryptobot:${POSTGRES_PASSWORD:-cryptobot_dev}@postgres:5432/cryptobot
      - PYTHONUNBUFFERED=1
      - PYTHONUTF8=1
      - MONGO_URL=${MONGO_URL:-mongodb://localhost:27017/}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tradingnet

  # ── WebSocket Server (Node.js — real-time event bridge) ───
  websocket:
    build: ./server
    container_name: crypto-websocket
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const net = require('net'); const s = net.createConnection(8080, () => { s.end(); process.exit(0); }); s.on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - tradingnet

  # ── Frontend Dashboard (React + nginx) ────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: crypto-frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
      - websocket
    restart: unless-stopped
    networks:
      - tradingnet

volumes:
  postgres-data:
    driver: local
  ml-data:
    driver: local
  ml-models:
    driver: local
  ml-buffer:
    driver: local

networks:
  tradingnet:
    driver: bridge
